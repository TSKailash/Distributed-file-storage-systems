services:
  postgres:
    image: postgres:17
    container_name: distributed-storage-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: distributed-storage-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: