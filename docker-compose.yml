services:
  postgres:
    image: postgres:17
    container_name: distributed-storage-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: distributed-storage-redis
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    container_name: distributed-storage-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  nginx:
    image: nginx:latest
    container_name: distributed-storage-nginx
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - minio


volumes:
  postgres_data:
  minio_data: